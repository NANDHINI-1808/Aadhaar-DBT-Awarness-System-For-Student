version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: aadhaar-dbt-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: local_dev_password_123
      POSTGRES_DB: aadhaar_dbt_db
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
